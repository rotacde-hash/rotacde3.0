<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Login Administrativo - Rota CDE Transfer</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="../assets/logo_icon.png" alt="Rota CDE Transfer Logo">
            </div>
            
            <h1 class="login-title">Área Restrita</h1>
            <p class="login-subtitle">ROTA CDE TRANSFER</p>
            
            <div id="login-error-msg" class="login-error"></div>
            
            <form id="login-form" class="login-form">
                <!-- Campo de E-mail (exibido apenas se o Firebase estiver configurado) -->
                <div class="form-group" id="email-group" style="display: none;">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" class="form-control" placeholder="exemplo@rotacde.site">
                </div>
                
                <div class="form-group">
                    <label for="login-password" id="password-label">Senha de Acesso</label>
                    <input type="password" id="login-password" class="form-control" placeholder="Digite a senha..." required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="justify-content: center; width: 100%; margin-top: 10px;">
                    Entrar no Painel
                </button>
            </form>
        </div>
    </div>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Config e Lógica -->
    <script src="assets/firebase-config.js"></script>
    <script src="assets/admin.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailGroup = document.getElementById('email-group');
            const passLabel = document.getElementById('password-label');
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('login-error-msg');
            
            // Exibe e-mail se Firebase estiver configurado
            const firebaseActive = isFirebaseEnabled();
            if (firebaseActive) {
                emailGroup.style.display = 'flex';
                passLabel.innerText = "Senha";
            }
            
            // Lógica de submissão do formulário
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                
                const password = document.getElementById('login-password').value;
                const email = firebaseActive ? document.getElementById('login-email').value : "";
                
                try {
                    const success = await login(password, email);
                    if (success) {
                        window.location.href = 'dashboard.html';
                    }
                } catch (err) {
                    errorMsg.innerText = err.message;
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
